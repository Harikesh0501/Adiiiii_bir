<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Aditi 💗</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        /* Hidden audio player */
        #bgMusic {
            display: none; 
        }
    </style>
</head>
<body>

    <!-- Background Music -->
    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <!-- Main Content Flow -->
    <iframe id="mainFrame" src="start.html"></iframe>

    <script>
        const bgMusic = document.getElementById("bgMusic");

        // Listen for messages from inside the iframe to play/stop music
        window.addEventListener("message", function(event) {
            if (event.data === "playMusic") {
                bgMusic.play().catch(e => console.log("Audio play delayed:", e));
            } else if (event.data === "stopMusic") {
                bgMusic.pause();
                bgMusic.currentTime = 0;
            }
        });
    </script>
</body>
</html>
